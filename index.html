<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>NOTE RUSH</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

:root {
  /* NEW FIGMA COLORS */
  --bg:     #22126A;
  --bg2:    #1C3DF7;
  --yellow: #FFFF5E;
  
  --dark:   #0A0820;
  --ok:     #00FF88;
  --err:    #FF2244;
  --blue:   #4433FF;
  --muted:  rgba(255,255,94,0.45); /* Adjusted for new yellow */
}

body {
  background: var(--bg);
  color: var(--yellow);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════
   INTRO PAGE (FULL SCREEN LAYOUT)
══════════════════════════════════════ */
#intro-page {
  display: block; /* Allows scrolling to settings below */
  background: var(--bg);
  overflow-x: hidden;
}

.intro-main {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: 8vh 5vw; /* HUGE padding for top and bottom */
}

/* ── LEADERBOARD (top, brutalist) ── */
.lb-hero {
  width: 100%;
  max-width: 480px;
  padding: 0;
  margin-bottom: 0;
}
.lb-hero-title { display: none; }
.lb-table { width: 100%; border-collapse: collapse; }
.lb-row {
  display: grid;
  grid-template-columns: 2rem 1fr auto;
  padding: 0.55rem 1.2rem;
  border-bottom: 1px solid rgba(255,255,94,0.12);
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--yellow);
  letter-spacing: 0.04em;
  line-height: 1;
}
.lb-rank { color: var(--yellow); }
.lb-name { color: var(--yellow); padding-left: 0.6rem; }
.lb-score { color: var(--yellow); }
.lb-loading, .lb-empty {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  padding: 1rem 1.2rem;
  letter-spacing: 0.1em;
  text-align: center;
}
.new-entry { background: rgba(255,255,94,0.07); }

/* ── HERO / LOGO SECTION ── */
.intro-hero {
  width: 100%;
  max-width: 480px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
}

.graffiti-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.logo-lockup {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 2.2rem 1.2rem 1.8rem;
}
.logo-lockup img {
  width: 100%;
  max-width: 340px;
  height: auto;
}

/* ── JOGAR BUTTON (HUGE) ── */
.jogar-btn {
  display: block;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 25px;
  background: var(--yellow);
  color: var(--bg);
  border: none;
  border-radius: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  text-align: center;
  box-shadow: 0 8px 0 rgba(0,0,0,0.2);
  transition: transform 0.1s, box-shadow 0.1s;
}
.jogar-btn:active {
  transform: translateY(4px);
  box-shadow: 0 4px 0 rgba(0,0,0,0.2);
}

/* ── SETTINGS PANEL (A screen below) ── */
.settings-panel {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 2rem 1.2rem 4rem;
  background: var(--bg2);
  border-radius: 24px 24px 0 0;
  display: flex;
  flex-direction: column;
  gap: 0;
  min-height: 50vh;
}

/* Sliders */
.sr {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  padding: 0 0 1.2rem;
}
.sr-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--yellow);
  letter-spacing: 0.06em;
  display: flex;
  justify-content: space-between;
}
.sr-val { color: var(--yellow); font-weight: 700; }

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: rgba(255,255,94,0.25);
  outline: none;
  cursor: pointer;
  border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  background: var(--yellow);
  cursor: pointer;
  border-radius: 50%;
}
input[type=range]::-moz-range-thumb {
  width: 20px;
  height: 20px;
  background: var(--yellow);
  cursor: pointer;
  border-radius: 50%;
  border: none;
}

/* Toggle rows */
.ptoggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 0.9rem;
  margin-bottom: 0.5rem;
  background: var(--yellow);
  border-radius: 8px;
  cursor: pointer;
  user-select: none;
}
.ptoggle-row.off {
  background: var(--bg);
  border: 2px solid rgba(255,255,94,0.25);
}
.ptoggle-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--bg);
  letter-spacing: 0.04em;
}
.ptoggle-row.off .ptoggle-label {
  color: rgba(255,255,94,0.4);
}

/* Toggle switch */
.toggle-sw { display: flex; align-items: center; cursor: pointer; }
.toggle-sw input { display: none; }
.toggle-track {
  width: 46px;
  height: 28px;
  background: var(--dark);
  border: 2px solid var(--bg);
  position: relative;
  transition: background 0.15s;
  flex-shrink: 0;
  border-radius: 14px;
}
.ptoggle-row .toggle-track {
  background: var(--bg);
  border-color: var(--bg);
}
.ptoggle-row.off .toggle-track {
  background: var(--dark);
  border-color: rgba(255,255,94,0.3);
}
.toggle-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 20px;
  height: 20px;
  background: var(--yellow);
  border-radius: 50%;
  transition: transform 0.15s;
}
.ptoggle-row.off .toggle-thumb {
  background: rgba(255,255,94,0.35);
}
.toggle-sw input:checked ~ .toggle-track .toggle-thumb {
  transform: translateX(18px);
}

/* Theme button */
.theme-btn {
  display: block;
  width: 100%;
  padding: 1.1rem;
  margin-top: 1rem;
  background: var(--yellow);
  border: none;
  border-radius: 12px;
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.05rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: opacity 0.1s;
}
.theme-btn:hover { opacity: 0.85; }

/* ══════════════════════════════════════
   GAME HEADER (CLEANED UP)
══════════════════════════════════════ */
#game-header {
  display: none;
  position: sticky;
  top: 0;
  z-index: 100;
  background: transparent;
  padding: 20px 1.2rem;
  align-items: center;
  justify-content: space-between;
}
#game-header.show { display: flex; }

.header-logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.header-logo-icon svg { width: 32px; height: 32px; }
.header-logo-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.2rem;
  font-weight: 800;
  color: #FFFFFF;
  letter-spacing: 0.06em;
  line-height: 1.1;
}

.header-score-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2rem;
  font-weight: 800;
  color: var(--yellow);
  line-height: 1;
}

/* ══════════════════════════════════════
   GAME PAGE
══════════════════════════════════════ */
#game-page {
  display: none;
  flex-direction: column;
  flex: 1;
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  padding: 0 0 2rem;
}
#game-page.show { display: flex; }

#ct {
  padding: 1rem 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ══════════════════════════════════════
   GAME COMPONENTS
══════════════════════════════════════ */

/* Card */
.card {
  background: var(--bg2);
  border-radius: 24px;
  padding: 2rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.ptag {
  font-size: 0.75rem;
  font-weight: 800;
  letter-spacing: 0.14em;
  color: var(--yellow);
  text-transform: uppercase;
  text-align: center;
}
.nname {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(3rem, 15vw, 4rem);
  font-weight: 800;
  color: var(--yellow);
  line-height: 1;
  letter-spacing: -0.02em;
  text-align: center;
}

/* Staff */
.staffw, .drag-staffw { width: 100%; overflow: hidden; }
.ssvg { width: 100%; height: auto; display: block; }

/* Buttons */
.playbtn {
  padding: 1rem 1.2rem;
  background: var(--yellow);
  border: none;
  border-radius: 12px;
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  cursor: pointer;
  min-height: 44px;
  transition: opacity 0.1s;
}
.playbtn:hover, .playbtn:active { opacity: 0.9; }
.playbtn-ref { opacity: 0.6; background: var(--bg); color: var(--yellow); border: 2px solid var(--yellow); }
.play-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

.linfo {
  font-size: 0.7rem;
  color: #fff;
  letter-spacing: 0.1em;
  text-align: center;
}
.lnav { display: flex; gap: 0.5rem; justify-content: space-between; }

.nbtn {
  flex: 1;
  padding: 1rem;
  background: var(--bg);
  border: 2px solid var(--yellow);
  border-radius: 12px;
  color: var(--yellow);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  cursor: pointer;
  min-height: 48px;
  transition: background 0.1s, color 0.1s;
}
.nbtn:hover, .nbtn:active { background: var(--yellow); color: var(--bg); }
.nbtn.go { background: var(--yellow); color: var(--bg); border: none; }
.nbtn.go:hover { opacity: 0.9; }

/* Options */
.opts { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.obtn {
  flex: 1;
  min-width: 120px;
  padding: 1rem;
  background: var(--bg);
  border: 2px solid rgba(255,255,94,0.4);
  border-radius: 12px;
  color: var(--yellow);
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  cursor: pointer;
  min-height: 52px;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.obtn:hover:not(:disabled) { border-color: var(--yellow); background: rgba(255,255,94,0.08); }
.obtn:disabled { cursor: default; }
.obtn.correct { background: var(--ok); border-color: var(--ok); color: var(--bg); }
.obtn.wrong   { background: var(--err); border-color: var(--err); color: #fff; }

/* Feedback */
#fb {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  min-height: 1.2rem;
  text-align: center;
}
.ok  { color: var(--ok); }
.err { color: var(--err); }

/* Next btn */
#nxt {
  display: none;
  padding: 1rem;
  background: var(--yellow);
  border: none;
  border-radius: 12px;
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  cursor: pointer;
  min-height: 48px;
  transition: opacity 0.1s;
}
#nxt.show { display: block; }
#nxt:hover { opacity: 0.85; }

/* Drag */
.drag-hint {
  font-size: 0.7rem;
  color: #fff;
  letter-spacing: 0.08em;
  text-align: center;
}
.drag-confirm {
  padding: 1rem;
  background: var(--yellow);
  border: none;
  border-radius: 12px;
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  cursor: pointer;
  min-height: 48px;
  width: 100%;
}
.drag-confirm:disabled { opacity: 0.5; cursor: default; }

/* Unlock banner */
.unlock-banner {
  background: rgba(255,255,94,0.1);
  border: 1.5px solid rgba(255,255,94,0.4);
  border-radius: 8px;
  padding: 0.8rem;
  font-size: 0.8rem;
  color: var(--yellow);
  font-weight: 700;
  letter-spacing: 0.06em;
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  text-align: center;
}
.unlock-banner span {
  font-size: 0.65rem;
  font-weight: 400;
  color: #fff;
}

/* Piano */
.pianow {
  width: 100%;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.pianow::-webkit-scrollbar { display: none; }
.piano {
  position: relative;
  display: flex;
  flex-shrink: 0;
}
.wkey {
  position: absolute;
  height: 112px;
  background: rgba(255,253,238,0.9);
  border: 1.5px solid #0A0820;
  border-radius: 0 0 8px 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 6px;
  transition: background 0.08s;
  user-select: none;
  touch-action: manipulation;
}
.wkey.inactive  { background: rgba(100,80,200,0.2); cursor: default; }
.wkey.dis       { cursor: default; pointer-events: none; }
.wkey.ck        { background: rgba(255,255,94,0.55); }
.wkey.wk        { background: rgba(255,34,68,0.55); }
.wkey.pressed   { background: rgba(255,255,94,0.35); }
.wlbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 800;
  color: var(--bg);
  text-align: center;
  line-height: 1.1;
  pointer-events: none;
  white-space: pre;
}
.bkey {
  position: absolute;
  width: 22px;
  height: 68px;
  background: #0A0820;
  border: 1px solid #000;
  border-radius: 0 0 4px 4px;
  z-index: 2;
  cursor: pointer;
  transition: background 0.08s;
  touch-action: manipulation;
}
.bkey.dis     { cursor: default; pointer-events: none; }
.bkey.pressed { background: #2a1a6a; }

/* Ref piano */
.ref-piano-outer {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  margin-top: 1rem;
}
.ref-piano-lbl {
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #fff;
}

/* Game over */
.combo-lost {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  padding: 1rem 0;
}
.combo-lost .big {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.4rem, 6vw, 2rem);
  font-weight: 800;
  color: var(--err);
  letter-spacing: 0.06em;
}
.combo-lost .score-show {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(2rem, 8vw, 3rem);
  font-weight: 800;
  color: var(--yellow);
  line-height: 1;
}

/* Name entry */
.name-entry { display: flex; flex-direction: column; align-items: center; gap: 0.85rem; }
.name-entry h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--yellow);
  letter-spacing: 0.08em;
}
.name-chars { display: flex; gap: 0.45rem; }
.name-char {
  width: 50px; height: 58px;
  background: var(--bg);
  border: 2.5px solid rgba(255,255,94,0.3);
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--yellow);
  text-align: center;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.name-char.active { border-color: var(--yellow); background: var(--bg2); }
.char-arrows { display: flex; gap: 0.28rem; }
.carrow {
  width: 40px; height: 40px;
  border: 2px solid rgba(255,255,94,0.3);
  border-radius: 8px;
  background: var(--bg);
  color: var(--yellow);
  font-size: 0.95rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  font-family: 'JetBrains Mono', monospace;
}
.carrow:hover, .carrow:active { border-color: var(--yellow); }
.submit-btn {
  padding: 1rem 2.6rem;
  border: none;
  border-radius: 12px;
  background: var(--yellow);
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: 0.1em;
  min-height: 48px;
}
.submit-btn:hover { opacity: 0.85; }
.skip-btn {
  padding: 0.6rem 1.3rem;
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  background: transparent;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  cursor: pointer;
  letter-spacing: 0.06em;
  min-height: 38px;
}

/* Animations */
@keyframes pop-in {
  0%   { transform: scale(.88); opacity: 0; }
  70%  { transform: scale(1.03); }
  100% { transform: scale(1); opacity: 1; }
}
.pop-in { animation: pop-in .22s ease forwards; }

@keyframes wshk {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.shake { animation: wshk .32s ease; }

.cp {
  position: fixed;
  width: 10px; height: 12px;
  pointer-events: none;
  z-index: 9999;
  animation: cpf .85s ease-in forwards;
}
@keyframes cpf {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div id="intro-page">

  <div class="intro-main">
    
    <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
      <div class="lb-hero" id="lb-intro"></div>

      <div class="intro-hero">
        <div class="logo-lockup">
          <h1 style="color: white; font-size: 3.5rem; text-align: center; margin-bottom: 20px;">NOTE RUSH</h1>
        </div>
      </div>
    </div>

    <button class="jogar-btn" onclick="startGame()">JOGAR</button>

  </div><div class="settings-panel">

    <div style="text-align: center; color: white; margin-bottom: 2rem; opacity: 0.5; font-size: 0.8rem;">
      ▼ Configurações ▼
    </div>

    <div class="sr">
      <div class="sr-label">
        <span>acertos p/ avançar</span>
        <span class="sr-val" id="sfp-v">5</span>
      </div>
      <input type="range" id="sfp" min="2" max="12" value="5"
        oninput="document.getElementById('sfp-v').textContent=this.value">
    </div>

    <div class="sr">
      <div class="sr-label">
        <span>notas iniciais</span>
        <span class="sr-val" id="sni-v">2</span>
      </div>
      <input type="range" id="sni" min="1" max="13" value="2"
        oninput="document.getElementById('sni-v').textContent=this.value">
    </div>

    <label class="ptoggle-row" id="row-ph1" onclick="togglePhase('ph1','row-ph1')">
      <span class="ptoggle-label">ver/ouvir</span>
      <label class="toggle-sw" onclick="event.stopPropagation()">
        <input type="checkbox" id="ph1" checked onchange="updateRowStyle('ph1','row-ph1')">
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </label>
    </label>

    <label class="ptoggle-row" id="row-ph2" onclick="togglePhase('ph2','row-ph2')">
      <span class="ptoggle-label">nome</span>
      <label class="toggle-sw" onclick="event.stopPropagation()">
        <input type="checkbox" id="ph2" checked onchange="updateRowStyle('ph2','row-ph2')">
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </label>
    </label>

    <label class="ptoggle-row" id="row-ph3" onclick="togglePhase('ph3','row-ph3')">
      <span class="ptoggle-label">posição</span>
      <label class="toggle-sw" onclick="event.stopPropagation()">
        <input type="checkbox" id="ph3" checked onchange="updateRowStyle('ph3','row-ph3')">
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </label>
    </label>

];

function NY(sp) { return BY - sp*(LS/2); }

function buildStaff({showNote=null, interactive=false, revealNote=null}={}) {
  const PL=65, PR=18;
  let s = `<svg class="ssvg" viewBox="0 0 ${SW} ${SH}" xmlns="http://www.w3.org/2000/svg">`;
  const gc='rgba(255,255,255,0.22)', gx1=PL, gx2=SW-PR; /* Lighter staff lines */
  for(let sp=-2; sp>=-10; sp-=2)
    s+=`<line x1="${gx1}" y1="${NY(sp)}" x2="${gx2}" y2="${NY(sp)}" stroke="${gc}" stroke-width="1.2" stroke-dasharray="6 4"/>`;
  for(let sp=10; sp<=14; sp+=2)
    s+=`<line x1="${gx1}" y1="${NY(sp)}" x2="${gx2}" y2="${NY(sp)}" stroke="${gc}" stroke-width="1.2" stroke-dasharray="6 4"/>`;
  for(let i=0; i<5; i++) { const y=NY(i*2); s+=`<line x1="${PL}" y1="${y}" x2="${SW-PR}" y2="${y}" stroke="#FFFFFF" stroke-width="1.8"/>`; } /* White solid staff */
  const cfs=LS*5.4, cy2=BY+LS*0.42;
  s+=`<text x="9" y="${cy2}" font-size="${cfs}" fill="#FFFF5E" font-family="Georgia,serif" opacity=".7">&#x1D11E;</text>`;

  function ledgers(sp, cx, col='#FFFFFF') {
    let ll=''; const lx1=cx-19, lx2=cx+19;
    if(sp<0) for(let p=-2; p>=(sp%2===0?sp:sp-1); p-=2) ll+=`<line x1="${lx1}" y1="${NY(p)}" x2="${lx2}" y2="${NY(p)}" stroke="${col}" stroke-width="1.5"/>`;
    if(sp>8)  for(let p=10; p<=(sp%2===0?sp:sp+1); p+=2) ll+=`<line x1="${lx1}" y1="${NY(p)}" x2="${lx2}" y2="${NY(p)}" stroke="${col}" stroke-width="1.5"/>`;
    return ll;
  }
  function drawNote(id, col='#FFFF5E') {
    const n=nd(id); const sp=n.s+5; const cy=NY(sp), cx=NX;
    let r=ledgers(sp,cx,col);
    r+=`<ellipse cx="${cx}" cy="${cy}" rx="12" ry="8.5" fill="${col}" transform="rotate(-12,${cx},${cy})"/>`;
    const sd=sp<4?-1:1, sx=sd===1?cx-11:cx+11;
    r+=`<line x1="${sx}" y1="${cy}" x2="${sx}" y2="${cy+sd*46}" stroke="${col}" stroke-width="2"/>`;
    return r;
  }
  if (showNote)    s += drawNote(showNote, '#FFFF5E');
  if (revealNote)  s += drawNote(revealNote, '#00FF88');
  if (interactive) {
    ga().forEach(nid => {
      const n=nd(nid); const sp=n.s+5, cy=NY(sp), zx=NX-21, zy=cy-11;
      s+=`<rect x="${zx}" y="${zy}" width="42" height="22" rx="3" fill="#FFFF5E" fill-opacity="0" onmouseover="this.setAttribute('fill-opacity','0.15')" onmouseout="this.setAttribute('fill-opacity','0')" onclick="hPlace('${nid}')" style="cursor:pointer;touch-action:manipulation;"/>`;
    });
  }
  s += `</svg>`;
  return s;
}

function buildPiano(activeNotes, onKey, disAll=false) {
  const activeChrom = CHROMATIC.filter(k => k.id && activeNotes.includes(k.id));
  if (!activeChrom.length) return document.createElement('div');
  const minOct = Math.min(...activeChrom.map(k=>k.oct));
  const maxOct = Math.max(...activeChrom.map(k=>k.oct));
  const range = CHROMATIC.filter(k => k.oct>=minOct && k.oct<=maxOct);
  const whites = range.filter(k => !k.isB);
  const isNarrow = window.innerWidth <= 480;
  const GAP=2, WW=isNarrow?30:42, WH=isNarrow?88:112;
  const totalW = whites.length*(WW+GAP);
  const wrap = document.createElement('div'); wrap.className='pianow';
  const piano = document.createElement('div'); piano.className='piano';
  piano.style.width=totalW+'px'; piano.style.height=WH+'px';

  whites.forEach((k,wi) => {
    const isActive = k.id && activeNotes.includes(k.id);
    const btn = document.createElement('div');
    btn.className = 'wkey'+(disAll?' dis':'')+(k.id&&!isActive?' inactive':'');
    btn.style.cssText = `left:${wi*(WW+GAP)}px;width:${WW}px;`;
    if (k.id) btn.dataset.note = k.id;
    if (isActive && k.id) {
      const n = nd(k.id);
      btn.innerHTML = `<div class="wlbl">${n.lb.replace(/(₃|₄|₅)/,'\n$1')}</div>`;
    }
    if (!disAll && isActive && k.id) {
      const n = nd(k.id);
      let _tapped = false;
      btn.addEventListener('touchstart', e=>{e.preventDefault(); playNote(n.f,.7); btn.classList.add('pressed');},{passive:false});
      btn.addEventListener('touchend', e=>{e.preventDefault(); btn.classList.remove('pressed'); if(!_tapped){_tapped=true; onKey(k.id,btn); setTimeout(()=>_tapped=false,350);}},{passive:false});
      btn.addEventListener('mousedown', ()=>{playNote(n.f,.7); btn.classList.add('pressed');});
      btn.addEventListener('mouseup',   ()=>btn.classList.remove('pressed'));
      btn.addEventListener('mouseleave',()=>btn.classList.remove('pressed'));
      btn.addEventListener('click', ()=>onKey(k.id, btn));
    }
    piano.appendChild(btn);
  });

  range.filter(k=>k.isB).forEach(k => {
    const lwi = whites.findIndex(w=>w.oct===k.oct&&w.pc===k.pc-1);
    if (lwi<0) return;
    const bx = lwi*(WW+GAP)+WW*0.6;
    const btn = document.createElement('div');
    btn.className = 'bkey'+(disAll?' dis':'');
    btn.style.cssText = `left:${bx}px;top:0;`;
    if (!disAll) {
      btn.addEventListener('touchstart', e=>{e.preventDefault(); playNote(k.f,.7); btn.classList.add('pressed');},{passive:false});
      btn.addEventListener('touchend', e=>{e.preventDefault(); btn.classList.remove('pressed');},{passive:false});
      btn.addEventListener('mousedown', ()=>{playNote(k.f,.7); btn.classList.add('pressed');});
      btn.addEventListener('mouseup',   ()=>btn.classList.remove('pressed'));
      btn.addEventListener('mouseleave',()=>btn.classList.remove('pressed'));
    }
    piano.appendChild(btn);
  });
  wrap.appendChild(piano);

  const activeWhiteIdx = whites.map((w,i)=>w.id&&activeNotes.includes(w.id)?i:-1).filter(i=>i>=0);
  if (activeWhiteIdx.length) {
    const first = activeWhiteIdx[0], last = activeWhiteIdx[activeWhiteIdx.length-1];
    const centerX = ((first+last+1)/2)*(WW+GAP);
    requestAnimationFrame(()=>{
      const visible=wrap.clientWidth||wrap.offsetWidth||0;
      const maxScroll=Math.max(0,piano.scrollWidth-visible);
      wrap.scrollLeft=Math.min(Math.max(centerX-visible/2,0),maxScroll);
    });
  }
  return wrap;
}

    const press=()=>{playNote(k.f,.55); btn.style.background='#22126A'; btn.classList.add('pressed');}; const rel=()=>{btn.style.background='#0A0820'; btn.classList.remove('pressed');};
    btn.addEventListener('mousedown',press); btn.addEventListener('mouseup',rel); btn.addEventListener('mouseleave',rel);
    btn.addEventListener('touchstart',e=>{e.preventDefault();press();},{passive:false}); btn.addEventListener('touchend',e=>{e.preventDefault();rel();},{passive:false});
    piano.appendChild(btn);
  });
  wrap.appendChild(piano);

  const activeWhiteIdx=whites.map((w,i)=>w.id&&active.includes(w.id)?i:-1).filter(i=>i>=0);
  if(activeWhiteIdx.length){
    const first=activeWhiteIdx[0], last=activeWhiteIdx[activeWhiteIdx.length-1];
    const centerX=((first+last+1)/2)*(WW+GAP);
    requestAnimationFrame(()=>{ const visible=wrap.clientWidth||0; const maxScroll=Math.max(0,piano.scrollWidth-visible); wrap.scrollLeft=Math.min(Math.max(centerX-visible/2,0),maxScroll); });
  }
  outer.appendChild(wrap);
  ct.appendChild(outer);
}

// ── PHASE 1 — LEARN ──
function rLearn() {
  const notes=ga(), note=notes[Math.min(G.li,notes.length-1)], n=nd(note);
  const card=document.createElement('div'); card.className='card pop-in';
  const uBanner=G.pendingUnlock?`<div class="unlock-banner">🔓 Nova nota: ${n.lB}!<span>Veja onde ela fica antes de continuar</span></div>`:'';
  const noteCount=notes.length>1?`<div class="linfo">${G.li+1} / ${notes.length} notas</div>`:'';
  card.innerHTML=`<div class="ptag">Fase 1 — Memorize</div>
    ${uBanner}
    <div class="nname">${n.lB}</div>
    <div class="staffw">${buildStaff({showNote:note})}</div>
    <button class="playbtn" onclick="playNote(${n.f})">♩ Ouvir nota</button>
    ${noteCount}
    <div class="lnav">
      ${G.li>0?`<button class="nbtn" onclick="lPrev()">← Ant</button>`:'<span></span>'}
      ${G.li<notes.length-1
        ?`<button class="nbtn" onclick="lNext()">Próx →</button>`
        :`<button class="nbtn go" onclick="goNextPhase(1)">Praticar →</button>`}
    </div>`;
  ct.appendChild(card);
}

// ── PHASE 2 — IDENTIFY ──
function rIdentify() {
  if (!G.cur||G.ans) pickNew();
  const note=G.cur, dist=getDistractors([note],2), ch=shuf([note,...dist]);
  const card=document.createElement('div'); card.className='card pop-in'; card.id='acard';
  card.innerHTML=`<div class="ptag">Fase 2 — Qual é esta nota?</div>
    <div class="staffw" id="sd">${buildStaff({showNote:note})}</div>
    <div class="opts">${ch.map(nid=>`<button class="obtn" id="ob-${nid}" onclick="hId('${nid}')">${nd(nid).lB}</button>`).join('')}</div>
    <div id="fb"></div><button id="nxt" onclick="nextQ()">Próxima →</button>`;
  ct.appendChild(card);
}

// ── PHASE 3 — PLACE ──
function rPlace() {
  if (!G.cur||G.ans) pickNew();
  const note=G.cur, n=nd(note);
  const card=document.createElement('div'); card.className='card pop-in'; card.id='acard';
  const isTouchDevice='ontouchstart' in window||navigator.maxTouchPoints>0;
  const hint=isTouchDevice?'Arraste ↕ pra posicionar, confirme':'Clique na posição correta na pauta';
  card.innerHTML=`<div class="ptag">Fase 3 — Posicione a nota</div>
    <div class="nname">${n.lB}</div>

    <div class="drag-staffw" id="drag-staff"></div>

    <button class="drag-confirm" id="drag-confirm" style="display:none" onclick="hPlaceDrag()">✓ Confirmar posição</button>
    <button id="nxt" onclick="nextQ()">Próxima →</button>`;
  ct.appendChild(card);
  initDragStaff(note);
}

// Drag staff
let _dragSp = null;
function buildStaffDrag(dragSp, revealId=null, ghostSp=null) {
  const PL=65, PR=18;
  let s=`<svg class="ssvg" viewBox="0 0 ${SW} ${SH}" xmlns="http://www.w3.org/2000/svg" style="cursor:${revealId===null?'crosshair':'default'}">`;
  const gc='rgba(255,255,255,0.22)', gx1=PL, gx2=SW-PR;
  for(let sp=-2;sp>=-10;sp-=2) s+=`<line x1="${gx1}" y1="${NY(sp)}" x2="${gx2}" y2="${NY(sp)}" stroke="${gc}" stroke-width="1.2" stroke-dasharray="6 4"/>`;
  for(let sp=10;sp<=14;sp+=2) s+=`<line x1="${gx1}" y1="${NY(sp)}" x2="${gx2}" y2="${NY(sp)}" stroke="${gc}" stroke-width="1.2" stroke-dasharray="6 4"/>`;
  for(let i=0;i<5;i++){const y=NY(i*2); s+=`<line x1="${PL}" y1="${y}" x2="${SW-PR}" y2="${y}" stroke="#FFFFFF" stroke-width="1.8"/>`;}
  const cfs=LS*5.4, cy2=BY+LS*0.42;
  s+=`<text x="9" y="${cy2}" font-size="${cfs}" fill="#FFFF5E" font-family="Georgia,serif" opacity=".7">&#x1D11E;</text>`;
  function ledgers(sp,cx,col){let ll='';const lx1=cx-19,lx2=cx+19;if(sp<0)for(let p=-2;p>=(sp%2===0?sp:sp-1);p-=2)ll+=`<line x1="${lx1}" y1="${NY(p)}" x2="${lx2}" y2="${NY(p)}" stroke="${col}" stroke-width="1.5"/>`;if(sp>8)for(let p=10;p<=(sp%2===0?sp:sp+1);p+=2)ll+=`<line x1="${lx1}" y1="${NY(p)}" x2="${lx2}" y2="${NY(p)}" stroke="${col}" stroke-width="1.5"/>`;return ll;}
  function drawNoteAt(sp,col,cx=NX,opacity=1){const cy=NY(sp);let r=ledgers(sp,cx,col);r+=`<ellipse cx="${cx}" cy="${cy}" rx="12" ry="8.5" fill="${col}" transform="rotate(-12,${cx},${cy})" opacity="${opacity}"/>`;const sdir=sp<4?-1:1,sx=sdir===1?cx-11:cx+11;r+=`<line x1="${sx}" y1="${cy}" x2="${sx}" y2="${cy+sdir*46}" stroke="${col}" stroke-width="2" opacity="${opacity}"/>`;return r;}
  if(ghostSp!==null&&!revealId) s+=drawNoteAt(ghostSp,'#FFFF5E',NX,0.35);
  if(dragSp!==null&&ghostSp===null&&!revealId) s+=drawNoteAt(dragSp,'#FFFF5E',NX,0.92);
  if(revealId){const rn=nd(revealId); s+=drawNoteAt(rn.s+5,'#00FF88',NX,1);}
  s+=`</svg>`; return s;
}

function initDragStaff(note) {
  const staffEl=document.getElementById('drag-staff');
  const isTouchDevice='ontouchstart' in window||navigator.maxTouchPoints>0;
  const validSps=ga().map(nid=>nd(nid).s+5);
  const minSp=Math.min(...validSps), maxSp=Math.max(...validSps);
  _dragSp=validSps[Math.floor(validSps.length/2)];
  function renderDrag(ghostSp=null,revealId=null){staffEl.innerHTML=buildStaffDrag(_dragSp,revealId,ghostSp);}
  if(isTouchDevice){
    document.getElementById('drag-confirm').style.display='block';
    renderDrag();
    let startY=null, startSp=null, _lastDragSp=_dragSp;
    const PX_PER_STEP=LS/2;
    function snapToValid(sp){return validSps.reduce((b,v)=>Math.abs(v-sp)<Math.abs(b-sp)?v:b,validSps[0]);}
    staffEl.addEventListener('touchstart',e=>{if(G.ans)return;e.preventDefault();startY=e.touches[0].clientY;startSp=_dragSp;},{passive:false});
    staffEl.addEventListener('touchmove',e=>{if(G.ans||startY===null)return;e.preventDefault();const dy=startY-e.touches[0].clientY;_dragSp=snapToValid(Math.max(minSp,Math.min(maxSp,startSp+Math.round(dy/PX_PER_STEP))));if(_dragSp!==_lastDragSp){renderDrag();const mn=ga().find(nid=>nd(nid).s+5===_dragSp);if(mn){const c=ctx2(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=nd(mn).f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);o.start(c.currentTime);o.stop(c.currentTime+0.18);}_lastDragSp=_dragSp;}},{passive:false});
    staffEl.addEventListener('touchend',e=>{if(G.ans||startY===null)return;e.preventDefault();const mn=ga().find(nid=>nd(nid).s+5===_dragSp);if(mn)playNote(nd(mn).f,0.4);startY=null;},{passive:false});
  }else{
    let _hoverSp=null;
    renderDrag(null);
    staffEl.addEventListener('mousemove',e=>{if(G.ans)return;const rect=staffEl.getBoundingClientRect();const scale=SH/rect.height;const svgY=(e.clientY-rect.top)*scale;const rawSp=(BY-svgY)/(LS/2);const snapped=validSps.reduce((b,v)=>Math.abs(v-rawSp)<Math.abs(b-rawSp)?v:b,validSps[0]);if(snapped!==_hoverSp){_hoverSp=snapped;_dragSp=snapped;renderDrag(_hoverSp);}});
    staffEl.addEventListener('mouseleave',()=>{if(G.ans)return;_hoverSp=null;renderDrag(null);});
    staffEl.addEventListener('click',e=>{if(G.ans||_hoverSp===null)return;const chosen=ga().find(nid=>nd(nid).s+5===_hoverSp);if(chosen)hPlace(chosen);});
  }
}

function hPlaceDrag() {
  if(G.ans||!lockAnswer())return;
  const cor=G.cur, corSp=nd(cor).s+5, staffEl=document.getElementById('drag-staff'), fb=document.getElementById('fb'), confirmBtn=document.getElementById('drag-confirm');
  if(confirmBtn) confirmBtn.disabled=true;
  if(_dragSp===corSp){staffEl.innerHTML=buildStaffDrag(_dragSp,null);fb.textContent='CERTO!';fb.className='ok';playNote(nd(cor).f,.8);onOk();}
  else{staffEl.innerHTML=buildStaffDrag(_dragSp,cor);fb.textContent='ERROU — era '+nd(cor).lB;fb.className='err';playNote(nd(cor).f,.8);onErr();}
  const nb=document.getElementById('nxt');if(nb)nb.classList.add('show');
}
function hPlace(chosen) {
  if(G.ans||!lockAnswer())return;
  const cor=G.cur, staffEl=document.getElementById('drag-staff'), fb=document.getElementById('fb');
  if(chosen===cor){staffEl.innerHTML=buildStaffDrag(nd(cor).s+5,null,null);fb.textContent='CERTO!';fb.className='ok';playNote(nd(cor).f,.8);onOk();}
  else{staffEl.innerHTML=buildStaffDrag(nd(chosen).s+5,cor,null);fb.textContent='ERROU — era '+nd(cor).lB;fb.className='err';playNote(nd(cor).f,.8);onErr();}
  const nb=document.getElementById('nxt');if(nb)nb.classList.add('show');
}

// ── PHASE 4 — LISTEN ──
function rListen() {
  if(!G.cur||G.ans){pickNew();buildSOpts();}
  const note=G.cur, n=nd(note), prev=G.lastNote?nd(G.lastNote):null;
  const card=document.createElement('div'); card.className='card pop-in'; card.id='acard';
  const prevBtn=prev?`<button class="playbtn playbtn-ref" onclick="playNote(${prev.f},1.2)">♩ ${prev.lB}</button>`:'';
  card.innerHTML=`<div class="ptag">Fase 4 — Ouça e identifique</div>
    <div class="play-row">
      ${prevBtn}
      <button class="playbtn" onclick="playNote(${n.f},1.2)">♩ Tocar nota</button>
    </div>
    <div class="opts">${G.sopts.map(nid=>`<button class="obtn" id="ob-${nid}" onclick="hId('${nid}')">${nd(nid).lB}</button>`).join('')}</div>
    <div id="fb"></div><button id="nxt" onclick="nextQ()">Próxima →</button>`;
  ct.appendChild(card);
  setTimeout(()=>playNote(n.f,1.2),300);
}

// ── PHASE 5 — PIANO ──
function rPlay() {
  if(!G.cur||G.ans) pickNew();
  const note=G.cur, n=nd(note), active=ga(), prev=G.lastNote?nd(G.lastNote):null;
  const card=document.createElement('div'); card.className='card pop-in'; card.id='acard';
  const prevBtn=prev?`<button class="playbtn playbtn-ref" onclick="playNote(${prev.f},1.2)">♩ ${prev.lB}</button>`:'';
  card.innerHTML=`<div class="ptag">Fase 5 — Toque no teclado</div>
    <div class="play-row">
      ${prevBtn}
      <button class="playbtn" onclick="playNote(${n.f},1.2)">♩ Tocar nota</button>
    </div>
    <div id="pia"></div>
    <div id="fb"></div><button id="nxt" onclick="nextQ()">Próxima →</button>`;
  ct.appendChild(card);
  card.querySelector('#pia').appendChild(buildPiano(active,(cid,btn)=>hPiano(cid,btn)));
  setTimeout(()=>playNote(n.f,1.2),300);
}

// ── GAME OVER ──
function renderGameOver() {
  const final=G._lastCombo||0;
  ct.innerHTML='';
  const card=document.createElement('div'); card.className='card pop-in'; card.id='acard';
  const lost=document.createElement('div'); lost.className='combo-lost';
  lost.innerHTML=`<div class="big">COMBO PERDIDO!</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:.8rem;color:rgba(255,255,94,0.45);letter-spacing:.12em;">SEU COMBO</div>
    <div class="score-show">x${final}</div>`;
  card.appendChild(lost);
  const lbWrap=document.createElement('div'); lbWrap.className='lb-hero'; lbWrap.style.cssText='width:100%;max-width:100%;margin-top:.5rem;';
  card.appendChild(lbWrap);
  ct.appendChild(card);

  getLeaderboard().then(rows=>{
    const qualifies=!rows||rows.length<5||(rows[rows.length-1]&&final>rows[rows.length-1].score);
    if(final>0&&qualifies){
      const nw=document.createElement('div'); card.insertBefore(nw,lbWrap);
      nw.appendChild(buildNameEntry(final,
        async(name)=>{nw.innerHTML=`<div class="lb-loading">SALVANDO...</div>`;await submitScore(name,final);nw.innerHTML='';renderLeaderboard(lbWrap,name,final);},
        ()=>{nw.innerHTML='';renderLeaderboard(lbWrap);}
      ));
    } else renderLeaderboard(lbWrap);
  });

  const br=document.createElement('div'); br.style.cssText='display:flex;gap:.6rem;margin-top:.5rem;width:100%;';
  const ag=document.createElement('button'); ag.className='jogar-btn'; ag.style.cssText='font-size: 1.5rem; padding: 15px; margin: 0;'; ag.textContent='↺ JOGAR DE NOVO';
  ag.addEventListener('click', startGame);
  br.appendChild(ag); card.appendChild(br);
}

// ══════════════════════════════════════════════
//  LEADERBOARD RENDER
// ══════════════════════════════════════════════
function renderLeaderboard(container, highlightName=null, highlightScore=null) {
  if (!container) return;
  container.innerHTML='<div class="lb-loading">carregando...</div>';
  getLeaderboard().then(rows=>{
    container.innerHTML='';
    if(!rows||!rows.length){container.innerHTML='<div class="lb-empty">nenhuma pontuação ainda</div>';return;}
    rows.forEach((r,i)=>{
      const row=document.createElement('div');
      row.className='lb-row'+(i===0?' top1':'')+(r.name===highlightName&&r.score===highlightScore?' new-entry':'');
      const rank=document.createElement('div'); rank.className='lb-rank'; rank.textContent=i+1;
      const name=document.createElement('div'); name.className='lb-name'; name.textContent=r.name||'???';
      const score=document.createElement('div'); rank.className='lb-score'; score.textContent='x'+r.score;
      row.append(rank,name,score); container.appendChild(row);
    });
  }).catch(()=>{container.innerHTML='<div class="lb-empty">erro ao carregar</div>';});
}

// Name entry widget
function buildNameEntry(score, onSubmit, onSkip) {
  const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let name=[0,0,0], active=0;
  const wrap=document.createElement('div'); wrap.className='name-entry';
  const h=document.createElement('h3'); h.textContent='Insira seu nome';
  const nameCharsEl=document.createElement('div'); nameCharsEl.className='name-chars';

  function charEl(idx){
    const d=document.createElement('div'); d.className='name-char'+(idx===active?' active':'');
    d.textContent=CHARS[name[idx]];
    d.onclick=()=>{active=idx; refresh();};
    return d;
  }
  function refresh(){nameCharsEl.innerHTML='';[0,1,2].forEach(i=>nameCharsEl.appendChild(charEl(i)));}

  const arrows=document.createElement('div'); arrows.className='char-arrows';
  const up=document.createElement('button'); up.className='carrow'; up.textContent='▲';
  const dn=document.createElement('button'); dn.className='carrow'; dn.textContent='▼';
  const pr=document.createElement('button'); pr.className='carrow'; pr.textContent='▶';
  up.onclick=()=>{name[active]=(name[active]-1+CHARS.length)%CHARS.length;refresh();};
  dn.onclick=()=>{name[active]=(name[active]+1)%CHARS.length;refresh();};
  pr.onclick=()=>{active=Math.min(active+1,2);refresh();};
  arrows.append(up,dn,pr);

  const sub=document.createElement('button'); sub.className='submit-btn'; sub.textContent='SALVAR';
  sub.onclick=()=>onSubmit(name.map(i=>CHARS[i]).join(''));

  const skip=document.createElement('button'); skip.className='skip-btn'; skip.textContent='pular';
  skip.onclick=onSkip;

  refresh();
  wrap.append(h,nameCharsEl,arrows,sub,skip);
  return wrap;
}

// ══════════════════════════════════════════════
//  LOGIC
// ══════════════════════════════════════════════
function startGame() {
  const {sni}=S(), allN=gn();
  const startCombo=Math.max(0,sni-2), firstPh=firstActivePhase();
  G={phase:firstPh,streak:0,unlocked:Math.min(sni,allN.length),combo:startCombo,bestCombo:startCombo,
     cur:null,ans:false,sopts:[],li:0,pendingUnlock:false,_lastCombo:0,lastNote:null};
  render();
}

function pickNew() {
  const n=ga();
  if(G.cur) G.lastNote=G.cur;
  G.cur=n[Math.floor(Math.random()*n.length)];
  G.ans=false; G.sopts=[];
}
function buildSOpts(){const dist=getDistractors([G.cur],2);G.sopts=shuf([G.cur,...dist]);}
function lPrev(){G.li=Math.max(0,G.li-1);render();}
function lNext(){G.li=Math.min(ga().length-1,G.li+1);render();}

function goNextPhase(current) {
  const next=nextActivePhase(current);
  if(next!==null){G.phase=next;G.streak=0;G.cur=null;G.ans=false;G.pendingUnlock=false;render();}
  else advanceNote();
}
function advanceNote() {
  const allN=gn();
  if(G.unlocked<allN.length){G.unlocked++;G.streak=0;G.pendingUnlock=true;G.li=G.unlocked-1;setTimeout(()=>{G.phase=firstActivePhase();G.cur=null;G.ans=false;render();},1000);}
  else{G.streak=0;const nb=document.getElementById('nxt');if(nb)nb.classList.add('show');}
}
function nextQ(){G.cur=null;G.ans=false;render();}
function shuf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function onOk() {
  G.streak++;
  const bonus=PHASE_BONUS[G.phase]||1;
  G.combo+=bonus;
  if(G.combo>G.bestCombo)G.bestCombo=G.combo;
  G.ans=true;jOk();confetti();updateComboDisplay();
  const {sfp}=S();
  if(G.streak>=sfp){setTimeout(()=>goNextPhase(G.phase),1000);return;}
  const nb=document.getElementById('nxt');if(nb)nb.classList.add('show');
}
function onErr() {
  G._lastCombo=G.combo;G.combo=0;G.streak=0;G.ans=true;
  jErr();updateComboDisplay();
  const c=document.getElementById('acard');if(c){c.classList.add('shake');setTimeout(()=>c.classList.remove('shake'),360);}
  setTimeout(()=>renderGameOver(),800);
}
function hId(chosen) {
  if(G.ans||!lockAnswer())return;
  const cor=G.cur;
  document.querySelectorAll('.obtn').forEach(b=>b.disabled=true);
  document.getElementById('ob-'+cor)?.classList.add('correct');
  const fb=document.getElementById('fb');
  if(chosen===cor){fb.textContent='CERTO!';fb.className='ok';if(G.phase!==4)playNote(nd(cor).f,.8);onOk();}
  else{document.getElementById('ob-'+chosen)?.classList.add('wrong');fb.textContent='ERROU — era '+nd(cor).lB;fb.className='err';playNote(nd(cor).f,.8);onErr();}
}
function hPiano(chosen,btn) {
  if(G.ans||!lockAnswer())return;
  const cor=G.cur;
  document.querySelectorAll('.wkey:not(.inactive),.bkey').forEach(k=>{k.classList.add('dis');k.style.pointerEvents='none';});
  document.querySelector('.wkey[data-note="'+cor+'"]')?.classList.add('ck');
  const fb=document.getElementById('fb');
  if(chosen===cor){fb.textContent='CERTO!';fb.className='ok';onOk();}
  else{btn.classList.add('wk');fb.textContent='ERROU — era '+nd(cor).lB;fb.className='err';playNote(nd(cor).f,.8);onErr();}
  const nb=document.getElementById('nxt');if(nb)nb.classList.add('show');
}

renderLeaderboard(document.getElementById('lb-intro'));
