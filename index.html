<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>NOTE RUSH</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<!-- Base styles -->
<link rel="stylesheet" href="css/base.css">

<!-- Component styles -->
<link rel="stylesheet" href="css/components/game-layout.css">
<link rel="stylesheet" href="css/components/intro.css">
<link rel="stylesheet" href="css/components/buttons.css">
<link rel="stylesheet" href="css/components/cards.css">
<link rel="stylesheet" href="css/components/staff.css">
<link rel="stylesheet" href="css/components/options.css">
<link rel="stylesheet" href="css/components/feedback.css">
<link rel="stylesheet" href="css/components/piano.css">
<link rel="stylesheet" href="css/components/name-entry.css">
<link rel="stylesheet" href="css/components/animations.css">

<!-- Theme overrides -->
<link rel="stylesheet" href="css/theme-cyberfunk.css">

</head>
<body>

<header id="game-header">
  <div class="header-logo">
    <div class="header-logo-text">NOTE RUSH</div>
  </div>
  <div class="combo-timer-bar" id="combo-timer-bar"></div>
  <div class="header-score-num" id="combo-disp">x0</div>
</header>

<!-- HOME SCREEN -->
<div id="intro-main">

  <div class="panel" id="lb-intro"></div>

  <div class="intro-actions">
    <button id="start-btn" class="btn">JOGAR</button>
    <button id="skip-ob-btn">Pular onboarding</button>
  </div>

</div>

<!-- GAME SCREEN (shown while playing) -->
<div id="game-page">
  <div id="ct"></div>
</div>

<!-- CONFIG PANEL — always accessible by scrolling -->
<div class="panel" id="config-panel">

  <div style="text-align: center; color: white; opacity: 0.5; font-size: 0.8rem;">
    ▼ Configurações ▼
  </div>

  <div class="sr">
    <div class="sr-label">
      <span>dificuldade (timer)</span>
      <span class="sr-val" id="sdif-v">tranquilo (5s)</span>
    </div>
    <input type="range" id="sdif" min="1" max="5" value="1" step="1">
  </div>

  <div class="sr">
    <div class="sr-label">
      <span>acertos p/ avançar</span>
      <span class="sr-val" id="sfp-v">5</span>
    </div>
    <input type="range" id="sfp" min="2" max="12" value="5">
  </div>

  <div class="sr">
    <div class="sr-label">
      <span>quantidade de notas</span>
      <span class="sr-val" id="sni-v">3</span>
    </div>
    <input type="range" id="sni" min="1" max="13" value="3">
  </div>

  <div class="sr">
    <div class="sr-label">
      <span>escala</span>
      <span class="sr-val" id="snr-v">estendida</span>
    </div>
    <input type="range" id="snr" min="1" max="3" value="2" step="1">
  </div>

  <label class="btn ptoggle-row" id="row-ph1" data-phase="ph1">
    <span class="ptoggle-label">ver/ouvir</span>
    <label class="toggle-sw">
      <input type="checkbox" id="ph1" checked>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </label>
  </label>

  <label class="btn ptoggle-row" id="row-ph2" data-phase="ph2">
    <span class="ptoggle-label">nome</span>
    <label class="toggle-sw">
      <input type="checkbox" id="ph2" checked>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </label>
  </label>

  <label class="btn ptoggle-row" id="row-ph3" data-phase="ph3">
    <span class="ptoggle-label">posição</span>
    <label class="toggle-sw">
      <input type="checkbox" id="ph3" checked>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </label>
  </label>

  <label class="btn ptoggle-row" id="row-ph4" data-phase="ph4">
    <span class="ptoggle-label">tocar</span>
    <label class="toggle-sw">
      <input type="checkbox" id="ph4" checked>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </label>
  </label>

  <label class="btn ptoggle-row" id="row-ph5" data-phase="ph5">
    <span class="ptoggle-label">ouvir</span>
    <label class="toggle-sw">
      <input type="checkbox" id="ph5" checked>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </label>
  </label>

  <select id="nr" style="display:none;"><option value="extended" selected></option></select>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
